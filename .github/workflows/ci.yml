# CI/CD Pipeline for Autonomous Research Stack
name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ruff
      run: pip install ruff

    - name: Lint with ruff
      run: ruff check .

    - name: Format check with ruff
      run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Dependency audit
      run: pip-audit -r requirements.txt

    - name: Scan for hardcoded secrets
      run: |
        echo "Scanning for potential secrets..."
        if grep -rn 'sk-ant-[a-zA-Z0-9]\{20,\}\|sk-[a-zA-Z0-9]\{20,\}\|AKIA[A-Z0-9]\{16,\}' --include='*.py' --include='*.yaml' --include='*.yml' . 2>/dev/null; then
          echo "ERROR: Potential secrets found!"
          exit 1
        fi
        echo "No hardcoded secrets found."

  test:
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -e .
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=html

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t autoresearch-stack:${{ github.sha }} .

    - name: Verify Docker image
      run: |
        docker run --rm autoresearch-stack:${{ github.sha }} python -c "import config; print('OK')"

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Publish to PyPI
      env:
        PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      run: |
        pip install build twine
        python -m build
        twine upload dist/* --token "$PYPI_TOKEN" || true
